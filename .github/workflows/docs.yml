name: Docs

on:
    push:
        branches: [master]
    # Allow manual deploys (Actions tab → Run workflow).
    workflow_dispatch: {}

# GitHub Pages deployment permissions.
permissions:
    contents: read
    pages: write
    id-token: write

# Only one in-flight deploy at a time.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv (Astral's Python package manager)
              uses: astral-sh/setup-uv@v3
              with:
                  enable-cache: true
                  cache-dependency-glob: pyproject.toml

            - name: Set up Python via uv
              run: uv python install 3.12

            - name: Sync docs dependencies into .venv
              # Reads `[project].dependencies` from pyproject.toml and
              # installs them into a project-local `.venv`. We don't use
              # `pip install --system` because modern Ubuntu marks the
              # runner's system Python as PEP-668 "externally managed".
              # `uv sync` honors `[tool.uv].package = false` from our
              # pyproject.toml so it just builds the venv without trying
              # to install the project itself.
              run: uv sync

            - name: Build site (strict — fails on broken links / missing nav)
              # `uv run` activates the .venv automatically; mkdocs +
              # plugins resolve out of it.
              run: uv run mkdocs build --strict --site-dir _site

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: _site

    deploy:
        # Only deploy from master; PRs build but don't deploy.
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
