name: Docs

on:
    push:
        branches: [master]
    # Allow manual deploys (Actions tab → Run workflow).
    workflow_dispatch: {}

# GitHub Pages deployment permissions.
permissions:
    contents: read
    pages: write
    id-token: write

# Only one in-flight deploy at a time.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: pip
                  cache-dependency-path: requirements-docs.txt

            - name: Install mkdocs-material + plugins
              run: pip install -r requirements-docs.txt

            - name: Build site (strict — fails on broken links / missing nav)
              run: mkdocs build --strict --site-dir _site

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: _site

    deploy:
        # Only deploy from master; PRs build but don't deploy.
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
