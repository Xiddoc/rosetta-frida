name: Pipeline CI

# Wave-2 integration test: build both test-app APKs, run them through
# sigmatcher → adapter, and diff the result against the hand-authored
# goldens. Triggered only on paths that can affect the pipeline so we
# don't burn minutes on docs / unrelated source edits.

on:
    push:
        branches: [master]
        paths:
            - 'tests/fixtures/test-app/**'
            - 'tools/adapters/**'
            - 'src/parse/**'
            - 'src/validate/**'
            - '.github/workflows/pipeline.yml'
    # AIDL root-cause follow-up: run on PRs targeting ANY branch (not
    # just master) so a fixture/adapter/AIDL change that breaks the real
    # APK build surfaces on the *feature-branch* PR that introduces it —
    # not weeks later on master or the Monday canary. (The original
    # `branches: [master]` gate is exactly how the duplicate-AIDL-method
    # regression slipped through; see docs/roadmap.md.) The path filter
    # is kept as-is: `tests/fixtures/test-app/**` already covers the Java
    # sources, AIDL, signatures, and goldens that drive the build / diff,
    # so the job still skips pure docs / unrelated-source churn while now
    # firing on the PR that actually touches those inputs.
    pull_request:
        paths:
            - 'tests/fixtures/test-app/**'
            - 'tools/adapters/**'
            - 'src/parse/**'
            - 'src/validate/**'
            - '.github/workflows/pipeline.yml'
    # Weekly canary at Monday 13:00 UTC — after the existing CI's
    # window of activity but still well within US-Pacific business
    # hours, so any infra rot (sigmatcher pin drift, AGP changes,
    # Gradle distribution availability) surfaces same-week.
    schedule:
        - cron: '0 13 * * MON'
    workflow_dispatch: {}

# Least-privilege default token: build + diff only reads the repo and
# uploads an artifact via the actions API. No `contents: write` needed.
permissions:
    contents: read

concurrency:
    group: pipeline-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pipeline:
        name: build + sigmatcher + adapter + golden-diff
        runs-on: ubuntu-latest
        timeout-minutes: 30
        # ADVISORY / non-blocking by design. This job needs the Android
        # SDK and pulls AGP/Gradle deps from network-restricted Google
        # Maven hosts (dl.google.com / maven.google.com), which are
        # routinely unreachable or rate-limited in CI. Making it a *hard*
        # required check on every-branch PRs would let an SDK/Maven
        # outage block unrelated merges. So it runs as an informational
        # signal: `continue-on-error` means a failure (incl. infra rot)
        # is reported on the PR but does NOT mark the check failed/red as
        # a merge gate. The fast, deterministic, SDK-free `verify` job in
        # ci.yml — which now includes the SDK-free `aidl:lint` guard that
        # catches the duplicate-AIDL-method class of regression on every
        # branch — remains the *required* gate. Promote this job to
        # required only once the build is reliably green in a network
        # environment where the Google Maven hosts are allowlisted.
        continue-on-error: true

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17 (Temurin)
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '17'

            - name: Set up Android SDK
              # Pinned to v3.2.2 by commit SHA (third-party action).
              uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

            - name: Set up Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: npm

            - name: Install uv (for sigmatcher install)
              # Pinned to v3.2.4 by commit SHA (third-party action).
              uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
              with:
                  enable-cache: true

            - name: Install sigmatcher (pinned)
              # sigmatcher 1.9.2 is the version the goldens / adapter
              # were authored against. Bump only with a matching
              # regenerate-goldens.sh pass.
              run: uv tool install sigmatcher==1.9.2

            - name: Install ripgrep
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ripgrep

            - name: Install apktool 3.0.2 (pinned — the goldens were generated with it)
              # The apt `apktool` package is the stale "2.7.0-dirty" build, whose
              # version string crashes sigmatcher's `version.parse()`
              # (InvalidVersion: '2.7.0-dirty'). Install the exact upstream release
              # the committed goldens were generated against: the apktool version
              # determines the smali, which determines the resolved map, so pinning
              # it keeps the golden-diff reproducible byte-for-byte. (Also drives
              # which unpack flags sigmatcher uses: >= 2.12.0 → `--only-manifest`.)
              run: |
                  set -euo pipefail
                  APKTOOL_VERSION=3.0.2
                  # Pinned SHA256s for the v3.0.2 wrapper script + jar.
                  # Verifying these turns the remote download into a
                  # supply-chain-checked artifact: a tampered or swapped
                  # binary (CDN compromise, MITM, upstream re-tag) fails
                  # the build instead of silently driving the golden diff.
                  # If you bump APKTOOL_VERSION, recompute both hashes
                  # (sha256sum) and update them here in the same commit.
                  APKTOOL_SCRIPT_SHA256=493a9c98df968a25c373ca9df871ca77730c82954be4959b74e90adaf91a0e77
                  APKTOOL_JAR_SHA256=eee4669a704a14e0623407e6701b0b91887e61e1e4049cb7a82833e14ae8b5fd
                  curl -fsSL -o /tmp/apktool \
                      "https://raw.githubusercontent.com/iBotPeaches/Apktool/v${APKTOOL_VERSION}/scripts/linux/apktool"
                  curl -fsSL -o /tmp/apktool.jar \
                      "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar"
                  echo "${APKTOOL_SCRIPT_SHA256}  /tmp/apktool"     | sha256sum -c -
                  echo "${APKTOOL_JAR_SHA256}  /tmp/apktool.jar"    | sha256sum -c -
                  sudo install -m 0755 /tmp/apktool     /usr/local/bin/apktool
                  sudo install -m 0755 /tmp/apktool.jar /usr/local/bin/apktool.jar
                  apktool --version

            - name: Install npm dependencies (npm ci)
              run: npm ci

            # ── Caching ───────────────────────────────────────────────
            - name: Cache Gradle dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ runner.os }}-${{ hashFiles('tests/fixtures/test-app/**/*.gradle.kts', 'tests/fixtures/test-app/gradle.properties', 'tests/fixtures/test-app/gradle/wrapper/gradle-wrapper.properties') }}
                  restore-keys: |
                      gradle-${{ runner.os }}-

            - name: Cache sigmatcher analysis directory
              uses: actions/cache@v4
              with:
                  path: ${{ runner.temp }}/sigmatcher-cache
                  # Cache key keyed on the signatures YAML + APK seeds —
                  # both seeds force-pin obfuscation, so a cached
                  # apktool unpack from a previous run is still valid if
                  # the seeds didn't change.
                  key: sigmatcher-${{ runner.os }}-${{ hashFiles('tests/fixtures/test-app/signatures/test-app.yaml', 'tests/fixtures/test-app/app/seeds/**') }}
                  restore-keys: |
                      sigmatcher-${{ runner.os }}-

            # ── Build both APKs ───────────────────────────────────────
            - name: Build v1.0.0 APK
              working-directory: tests/fixtures/test-app
              run: ./gradlew --quiet :app:assembleRelease -PapplyMapping=v1.0.0

            - name: Capture v1.0.0 APK
              run: cp tests/fixtures/test-app/app/build/outputs/apk/release/app-release-unsigned.apk /tmp/v1.0.0.apk

            - name: Build v1.1.0 APK
              working-directory: tests/fixtures/test-app
              run: ./gradlew --quiet :app:assembleRelease -PapplyMapping=v1.1.0

            - name: Capture v1.1.0 APK
              run: cp tests/fixtures/test-app/app/build/outputs/apk/release/app-release-unsigned.apk /tmp/v1.1.0.apk

            # ── Per-version sigmatcher + adapter + diff ───────────────
            - name: Prepare aux maps for the adapter
              run: |
                  mkdir -p /tmp/pipeline
                  cat > /tmp/pipeline/methodNameMap.json <<'EOF'
                  {
                      "put_2arg": "put",
                      "put_3arg": "put"
                  }
                  EOF
                  cat > /tmp/pipeline/classKindMap.json <<'EOF'
                  {
                      "com.example.testapp.IRemoteService": "interface",
                      "com.example.testapp.IRemoteService$Stub": "class",
                      "com.example.testapp.IServiceCallback$Stub": "class",
                      "com.example.testapp.IServiceCallback": "interface",
                      "com.example.testapp.Config": "class",
                      "com.example.testapp.BlobCache": "class",
                      "com.example.testapp.RemoteService": "class",
                      "com.example.testapp.RemoteService$1": "anonymous",
                      "com.example.testapp.RemoteService$1$1": "anonymous",
                      "com.example.testapp.Ticket": "class",
                      "com.example.testapp.Ticket$Companion": "synthetic",
                      "com.example.testapp.Ticket$Reader": "class",
                      "com.example.testapp.ErrorCode": "enum",
                      "com.example.testapp.AbstractServiceClient": "class",
                      "com.example.testapp.AbstractServiceClient$1": "anonymous",
                      "com.example.testapp.RemoteServiceClient": "class",
                      "com.example.testapp.PromiseCallback": "interface"
                  }
                  EOF

            - name: Run sigmatcher (v1.0.0)
              run: |
                  sigmatcher analyze /tmp/v1.0.0.apk \
                      --signatures tests/fixtures/test-app/signatures/test-app.yaml \
                      --output-format raw \
                      --output-file /tmp/pipeline/v1.0.0.raw.json \
                      --no-progress \
                      --cache-dir "${{ runner.temp }}/sigmatcher-cache"

            - name: Run adapter (v1.0.0)
              run: |
                  npx tsx tools/adapters/sigmatcher-cli.ts \
                      /tmp/pipeline/v1.0.0.raw.json \
                      --app com.example.testapp \
                      --version 1.0.0 \
                      --version-code 1 \
                      --method-name-map /tmp/pipeline/methodNameMap.json \
                      --class-kind-map  /tmp/pipeline/classKindMap.json \
                      -o /tmp/pipeline/v1.0.0.actual.json

            - name: Validate emitted map (v1.0.0)
              run: npm run --silent cli -- validate /tmp/pipeline/v1.0.0.actual.json

            - name: Diff vs golden (v1.0.0)
              run: |
                  if ! diff -u tests/fixtures/test-app/expected/v1.0.0.json /tmp/pipeline/v1.0.0.actual.json; then
                      echo "::error::v1.0.0 emitted map does not match the golden"
                      exit 1
                  fi
                  echo "v1.0.0 OK"

            - name: Run sigmatcher (v1.1.0)
              run: |
                  sigmatcher analyze /tmp/v1.1.0.apk \
                      --signatures tests/fixtures/test-app/signatures/test-app.yaml \
                      --output-format raw \
                      --output-file /tmp/pipeline/v1.1.0.raw.json \
                      --no-progress \
                      --cache-dir "${{ runner.temp }}/sigmatcher-cache"

            - name: Run adapter (v1.1.0)
              run: |
                  npx tsx tools/adapters/sigmatcher-cli.ts \
                      /tmp/pipeline/v1.1.0.raw.json \
                      --app com.example.testapp \
                      --version 1.1.0 \
                      --version-code 2 \
                      --method-name-map /tmp/pipeline/methodNameMap.json \
                      --class-kind-map  /tmp/pipeline/classKindMap.json \
                      -o /tmp/pipeline/v1.1.0.actual.json

            - name: Validate emitted map (v1.1.0)
              run: npm run --silent cli -- validate /tmp/pipeline/v1.1.0.actual.json

            - name: Diff vs golden (v1.1.0)
              run: |
                  if ! diff -u tests/fixtures/test-app/expected/v1.1.0.json /tmp/pipeline/v1.1.0.actual.json; then
                      echo "::error::v1.1.0 emitted map does not match the golden"
                      exit 1
                  fi
                  echo "v1.1.0 OK"

            # ── Artifacts on failure (or always, for spelunking) ──────
            - name: Upload pipeline artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: pipeline-${{ github.run_id }}
                  retention-days: 14
                  path: |
                      /tmp/v1.0.0.apk
                      /tmp/v1.1.0.apk
                      /tmp/pipeline/v1.0.0.raw.json
                      /tmp/pipeline/v1.1.0.raw.json
                      /tmp/pipeline/v1.0.0.actual.json
                      /tmp/pipeline/v1.1.0.actual.json
