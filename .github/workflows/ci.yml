name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

# Cancel superseded runs on the same branch to save CI minutes.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: verify (node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                # Node 24 (current LTS) + 26 (current). GitHub Actions
                # is phasing out older versions; we don't support <24.
                node: ['24', '26']

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js ${{ matrix.node }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - name: Install dependencies (npm ci)
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Tests + coverage (100% gate enforced by vitest.config.ts)
              run: npm run test:coverage

            - name: Upload coverage report
              if: matrix.node == '24'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage/
                  retention-days: 14

    cli-smoke:
        name: cli smoke test
        runs-on: ubuntu-latest
        needs: verify

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: npm

            - run: npm ci

            - name: rosetta validate (every .jsonc map in maps/)
              # Validates every map under maps/. Once the maps repo splits
              # off (V2+), this loop moves to that repo's CI; until then,
              # we validate the canonical sample + any other authored maps
              # that may live here. The glob keeps this future-proof.
              run: |
                  shopt -s globstar nullglob
                  found=0
                  for f in maps/**/*.jsonc; do
                      echo "::group::$f"
                      npm run --silent cli -- validate "$f"
                      echo "::endgroup::"
                      found=$((found + 1))
                  done
                  if [ "$found" = "0" ]; then
                      echo "::error::no .jsonc maps found under maps/"
                      exit 1
                  fi
                  echo "validated $found map(s)"

            - name: rosetta inspect + extract round-trip on a synthetic bundle
              run: |
                  cat > /tmp/synthetic.js <<'EOF'
                  const before = 1;
                  /*! -----BEGIN ROSETTA MAP----- */
                  const __rosetta_map = {
                    "schema_version": 1,
                    "app": "com.example.app",
                    "version": "3.4.5",
                    "classes": { "IFoo": { "obfuscated": "aaaa" } }
                  };
                  /*! -----END ROSETTA MAP----- */
                  const after = 2;
                  EOF
                  npm run --silent cli -- inspect /tmp/synthetic.js
                  npm run --silent cli -- extract /tmp/synthetic.js -o /tmp/extracted.json
                  test -s /tmp/extracted.json
                  grep -q "com.example.app" /tmp/extracted.json
