# rosetta-frida synthetic test-app sigmatcher signatures.
#
# Purpose: drive the pipeline-CI integration test — same YAML, two
# different obfuscated APKs (v1.0.0 and v1.1.0), two different
# sigmatcher outputs, both correctly resolving to the real-name targets
# documented in tests/fixtures/test-app/README.md.
#
# Anchoring strategy (so the same signatures match against both
# rotation seeds):
#
#   * Stable string literals — the `ROSETTA_ANCHOR` constants on
#     Config, BlobCache, and RemoteService survive R8 because they're
#     `static final String` initializers reached by live code.
#   * AIDL descriptors — `com.example.testapp.IRemoteService` /
#     `IServiceCallback` strings, emitted by the AIDL compiler into
#     the .Stub classes, never get rotated.
#   * Stable framework refs — `android.app.Service`,
#     `java.lang.Runnable`, `android.content.Context`, …
#   * Cross-class anchors — once a class (e.g. `Ticket`) is resolved,
#     child classes (`Ticket$Companion`, `Ticket$Reader`) reference its
#     descriptor in their signatures.
#
# Method names within a class come out as obfuscated single letters
# (`a`, `c`, …) because R8 rotates them too. The signatures only assert
# the *class identity*; the sigmatcher analyze step automatically
# discovers methods within a matched class via descriptor matching when
# a `MethodDefinition` is paired with a regex against an arg/return
# type that's unique enough to disambiguate.
#
# Multi-overload methods are modeled as TWO `MethodDefinition` entries
# with `_<N>arg` suffixes; the adapter's `methodNameMap` re-merges them
# under one real name (e.g. `put_2arg` + `put_3arg` → `put`).

# ─── Non-rotating AIDL contracts ─────────────────────────────────────

# The interface itself — emitted by aidl-compiler as a Java interface.
# R8 -keeps it via the proguard-rules.pro AIDL rule.
- name: 'IRemoteService'
  package: 'com.example.testapp'
  signatures:
      - signature: 'Lcom/example/testapp/IRemoteService;'
        type: regex
        count: 1-100

# The .Stub static nested class. AIDL emits the descriptor string
# "com.example.testapp.IRemoteService" inside this class for binder
# lookup; that's the stable anchor.
- name: 'IRemoteServiceStub'
  package: 'com.example.testapp'
  signatures:
      - signature: '"com\.example\.testapp\.IRemoteService"'
        type: regex
        count: 1

- name: 'IServiceCallback'
  package: 'com.example.testapp'
  signatures:
      - signature: 'Lcom/example/testapp/IServiceCallback;'
        type: regex
        count: 1-100

- name: 'IServiceCallbackStub'
  package: 'com.example.testapp'
  signatures:
      - signature: '"com\.example\.testapp\.IServiceCallback"'
        type: regex
        count: 1

# ─── Rotating Java classes — anchored on stable string literals ──────

# Fields-only constants holder. The ROSETTA_ANCHOR string is the
# primary identifier; the class is otherwise dominated by R8 field
# rotation (per the v1.1.0 seed comments, Config is the one class
# that intentionally has its fields shuffled to exercise that path).
- name: 'Config'
  package: 'com.example.testapp'
  signatures:
      - signature: '"rosetta-test-anchor-Config"'
        type: regex
        count: 1
  fields:
      - name: 'ROSETTA_ANCHOR'
        signatures:
            - signature: '"rosetta-test-anchor-Config"'
              type: regex
              count: 1
      - name: 'ENABLE_TRACING'
        signatures:
            - signature: 'ENABLE_TRACING'
              type: regex
              count: 1
      - name: 'MAX_RETRIES'
        signatures:
            - signature: 'MAX_RETRIES'
              type: regex
              count: 1
      - name: 'TIMEOUT_MILLIS'
        signatures:
            - signature: 'TIMEOUT_MILLIS'
              type: regex
              count: 1
      - name: 'ENDPOINT_URL'
        signatures:
            - signature: '"https://invalid\.example/api"'
              type: regex
              count: 1
      - name: 'currentDebugLevel'
        signatures:
            - signature: 'currentDebugLevel'
              type: regex
              count: 1

# Generic key/value cache. Identified by ROSETTA_ANCHOR; methods
# `get` (single overload) and `put` (two overloads) exercise the
# overload-remerging path in the adapter.
- name: 'BlobCache'
  package: 'com.example.testapp'
  signatures:
      - signature: '"rosetta-test-anchor-BlobCache"'
        type: regex
        count: 1-2
  fields:
      - name: 'ROSETTA_ANCHOR'
        signatures:
            - signature: '"rosetta-test-anchor-BlobCache"'
              type: regex
              count: 1
      - name: 'MAX_SIZE'
        signatures:
            - signature: 'MAX_SIZE'
              type: regex
              count: 1
      - name: 'instanceCount'
        signatures:
            - signature: 'instanceCount'
              type: regex
              count: 1
      - name: 'buffer'
        signatures:
            - signature: 'Ljava/util/HashMap;'
              type: regex
              count: 1
      - name: 'lastEvictedKey'
        signatures:
            - signature: 'lastEvictedKey'
              type: regex
              count: 1
  methods:
      - name: 'get'
        signatures:
            - signature: '\(Ljava/lang/String;\)Ljava/lang/Object;'
              type: regex
              count: 1
      - name: 'put_2arg'
        signatures:
            - signature: '\(Ljava/lang/String;Ljava/lang/Object;\)V'
              type: regex
              count: 1
      - name: 'put_3arg'
        signatures:
            - signature: '\(Ljava/lang/String;Ljava/lang/Object;J\)V'
              type: regex
              count: 1
      - name: 'evict'
        signatures:
            - signature: 'evict\(Ljava/lang/String;\)V'
              type: regex
              count: 1
      - name: 'clear'
        signatures:
            - signature: 'clear\(\)V'
              type: regex
              count: 1

