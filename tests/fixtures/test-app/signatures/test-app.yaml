# Enum — anchored on its unique ROSETTA_ANCHOR literal. NOTE: the three
# enum CONSTANTS (SUCCESS/TIMEOUT/AUTH_FAILED) are intentionally NOT
# captured as fields. They share the identical self-type descriptor
# (Lhhhh;) at their `.field` declarations, and sigmatcher's single
# `(?P<match>…)` capture has no per-constant disambiguator — their only
# distinguisher is the preceding `const-string` name in <clinit>, which
# is a string load, not a field decl. So we resolve the *non-constant*
# members instead: ROSETTA_ANCHOR, the scalar `code`, `$VALUES`, and
# getCode(). (The emitted golden therefore omits the three constants.)
- name: 'ErrorCode'
  package: 'com.example.testapp'
  signatures:
      - signature: '"rosetta-anchor-ErrorCode"'
        type: regex
        count: 1
  fields:
      - name: 'ROSETTA_ANCHOR'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Ljava/lang/String;) = "rosetta-anchor-ErrorCode"'
              type: regex
              count: 1
      - name: 'code'
        signatures:
            - signature: '\.field private final (?P<match>[a-z]:I)'
              type: regex
              count: 1
      - name: '$VALUES'
        signatures:
            - signature: '\.field private static final synthetic (?P<match>[a-z]:\[L[a-z]+;)'
              type: regex
              count: 1
  methods:
      - name: 'getCode'
        signatures:
            - signature: '\.method public [a-z]\(\)I'
              type: regex
              count: 1

