# rosetta-frida synthetic test-app sigmatcher signatures.
#
# Purpose: drive the pipeline-CI integration test — the same YAML, run
# against two differently-obfuscated APKs (v1.0.0 and v1.1.0), produces
# two sigmatcher outputs that both resolve to the real-name targets
# documented in tests/fixtures/test-app/README.md.
#
# ── How sigmatcher matching actually works (empirically verified
#    against sigmatcher 1.9.2) ──────────────────────────────────────
#
#   * A CLASS signature is a regex grepped against every smali FILE.
#     A file "matches" when its per-file occurrence count falls inside
#     the signature's `count` range; the class resolves only when
#     EXACTLY ONE file matches. So class anchors must be unique to the
#     defining file — we use either the `.class` declaration line (for
#     the AIDL contract classes, whose names never rotate) or a unique
#     string literal baked into the class (`rosetta-anchor-*` /
#     `rosetta-test-anchor-*`, which R8 preserves in the field table /
#     a kept method body even though the field/class names rotate).
#
#   * A METHOD signature is matched against each `.method … .end method`
#     block of the already-resolved class; the real method name is the
#     definition's `name`, the obfuscated name + descriptor come from
#     the matched block. We anchor on the JVM descriptor (which survives
#     obfuscation) rather than the method name (which rotates).
#
#   * A FIELD signature is `re.search`-ed over the whole class smali and
#     must CAPTURE the obfuscated `name:type` via a named group
#     `(?P<match>…)`; `count` is the number of regex matches in the
#     file and must be exactly 1. We capture each field by a regex that
#     is unique within its class (a distinctive type descriptor, or the
#     field's constant string value for same-typed fields).
#
# Multi-overload methods are modeled as TWO MethodDefinition entries
# with `_<N>arg` suffixes; the adapter's `methodNameMap` re-merges them
# under one real name (e.g. `put_2arg` + `put_3arg` → `put`).

# ─── Non-rotating AIDL contracts ─────────────────────────────────────
# Anchored on their `.class` declaration line, which exists in exactly
# one smali file each and never rotates (the AIDL names are -kept).

- name: 'IRemoteService'
  package: 'com.example.testapp'
  signatures:
      - signature: '\.class public interface abstract Lcom/example/testapp/IRemoteService;'
        type: regex
        count: 1

- name: 'IRemoteService$Stub'
  package: 'com.example.testapp'
  signatures:
      - signature: '\.class public abstract Lcom/example/testapp/IRemoteService\$Stub;'
        type: regex
        count: 1

- name: 'IServiceCallback'
  package: 'com.example.testapp'
  signatures:
      - signature: '\.class public interface abstract Lcom/example/testapp/IServiceCallback;'
        type: regex
        count: 1

- name: 'IServiceCallback$Stub'
  package: 'com.example.testapp'
  signatures:
      - signature: '\.class public abstract Lcom/example/testapp/IServiceCallback\$Stub;'
        type: regex
        count: 1

# ─── Rotating Java classes — anchored on stable string literals ──────

# Fields-only constants holder. Anchored on its unique ROSETTA_ANCHOR
# literal; fields are captured by their distinctive constant values
# (same-typed primitives are disambiguated by their initializer).
- name: 'Config'
  package: 'com.example.testapp'
  signatures:
      - signature: '"rosetta-test-anchor-Config"'
        type: regex
        count: 1
  fields:
      - name: 'ROSETTA_ANCHOR'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Ljava/lang/String;) = "rosetta-test-anchor-Config"'
              type: regex
              count: 1
      - name: 'ENABLE_TRACING'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Z)'
              type: regex
              count: 1
      - name: 'MAX_RETRIES'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:I) = 0x3'
              type: regex
              count: 1
      - name: 'TIMEOUT_MILLIS'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:J)'
              type: regex
              count: 1
      - name: 'ENDPOINT_URL'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Ljava/lang/String;) = "https://invalid\.example/api"'
              type: regex
              count: 1
      - name: 'currentDebugLevel'
        signatures:
            - signature: '\.field public static (?P<match>[a-z]:I)\n'
              type: regex
              count: 1

# Generic key/value cache. Identified by ROSETTA_ANCHOR; methods
# `get` (single overload) and `put` (two overloads) exercise the
# overload-remerging path in the adapter.
- name: 'BlobCache'
  package: 'com.example.testapp'
  signatures:
      - signature: '"rosetta-test-anchor-BlobCache"'
        type: regex
        count: 1-2
  fields:
      - name: 'ROSETTA_ANCHOR'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Ljava/lang/String;) = "rosetta-test-anchor-BlobCache"'
              type: regex
              count: 1
      - name: 'MAX_SIZE'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:I) = 0x400'
              type: regex
              count: 1
      - name: 'buffer'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Ljava/util/HashMap;)'
              type: regex
              count: 1
      - name: 'lastEvictedKey'
        signatures:
            - signature: '\.field public (?P<match>[a-z]:Ljava/lang/String;)\n'
              type: regex
              count: 1
  methods:
      - name: 'get'
        signatures:
            - signature: '\(Ljava/lang/String;\)Ljava/lang/Object;'
              type: regex
              count: 1
      - name: 'put_2arg'
        signatures:
            - signature: '\(Ljava/lang/String;Ljava/lang/Object;\)V'
              type: regex
              count: 1
      - name: 'put_3arg'
        signatures:
            - signature: '\(Ljava/lang/String;Ljava/lang/Object;J\)V'
              type: regex
              count: 1
      - name: 'clear'
        signatures:
            - signature: '\(\)V'
              type: regex
              count: 1

# The Service subclass. R8 keeps it at its real name (the manifest
# Service entry pins it), but its members still rotate. Anchored on the
# unique ROSETTA_ANCHOR literal.
- name: 'RemoteService'
  package: 'com.example.testapp'
  signatures:
      # The literal also appears as a const-string return value inside
      # the anonymous Stub subclass, so anchor on the field DECLARATION
      # (with its initializer) which exists only in RemoteService itself.
      - signature: '\.field static final [a-z]:Ljava/lang/String; = "rosetta-test-anchor-RemoteService"'
        type: regex
        count: 1
  fields:
      - name: 'ROSETTA_ANCHOR'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Ljava/lang/String;) = "rosetta-test-anchor-RemoteService"'
              type: regex
              count: 1
      - name: 'requestCounter'
        signatures:
            - signature: '\.field private (?P<match>[a-z]:I)'
              type: regex
              count: 1
      - name: 'lastTag'
        signatures:
            - signature: '\.field public (?P<match>[a-z]:Ljava/lang/String;)'
              type: regex
              count: 1
      - name: 'binder'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Lcom/example/testapp/IRemoteService\$Stub;)'
              type: regex
              count: 1

# RemoteService$1 — the anonymous IRemoteService.Stub subclass R8 emits
# for the inline `new IRemoteService.Stub() {…}`. Anchored on the
# requestTicket(Bundle, IServiceCallback) descriptor it implements
# (cross-class reference to the AIDL callback type that never rotates).
- name: 'RemoteService$1'
  package: 'com.example.testapp'
  signatures:
      # Unique to this anon: a synthetic field capturing the enclosing
      # RemoteService instance. The requestTicket descriptor alone also
      # appears in the AIDL Stub/Proxy/Default classes.
      - signature: '\.field final synthetic [a-z]:Lcom/example/testapp/RemoteService;'
        type: regex
        count: 1
  fields:
      - name: 'this$0'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Lcom/example/testapp/RemoteService;)'
              type: regex
              count: 1
  methods:
      - name: 'requestTicket'
        signatures:
            - signature: 'requestTicket\(Landroid/os/Bundle;Lcom/example/testapp/IServiceCallback;\)V'
              type: regex
              count: 1
      - name: 'requestPrompt'
        signatures:
            - signature: 'requestPrompt\(Landroid/os/Bundle;Lcom/example/testapp/IServiceCallback;\)Ljava/lang/String;'
              type: regex
              count: 1

# RemoteService$1$1 — the anonymous Runnable created inside
# requestPrompt. Anchored on its unique kept string literal.
- name: 'RemoteService$1$1'
  package: 'com.example.testapp'
  signatures:
      - signature: '"rosetta-anchor-RemoteServiceRetryRunnable"'
        type: regex
        count: 1
  fields:
      - name: 'val$callback'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Lcom/example/testapp/IServiceCallback;)'
              type: regex
              count: 1
      - name: 'val$params'
        signatures:
            - signature: '\.field.* (?P<match>[a-z]:Landroid/os/Bundle;)'
              type: regex
              count: 1
  methods:
      - name: 'run'
        signatures:
            - signature: '\.method public run\(\)V'
              type: regex
              count: 1

