# The anonymous Runnable created inside RemoteService.requestPrompt.
# R8 emits it as RemoteService$1 with a rotating obfuscated short
# name. Anchored on the captured `IServiceCallback` field reference
# in its synthetic constructor.
- name: 'RemoteServiceAnonRunnable'
  package: 'com.example.testapp'
  signatures:
      - signature: 'val\$callback'
        type: regex
        count: 1
  fields:
      - name: 'this$0'
        signatures:
            - signature: 'this\$0'
              type: regex
              count: 1
      - name: 'val$params'
        signatures:
            - signature: 'val\$params'
              type: regex
              count: 1
      - name: 'val$callback'
        signatures:
            - signature: 'val\$callback'
              type: regex
              count: 1
  methods:
      - name: 'run'
        signatures:
            - signature: 'run\(\)V'
              type: regex
              count: 1

