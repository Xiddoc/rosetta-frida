# Daemon settings — AGP needs at least 2GB to run R8.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX is mandatory on modern AGP.
android.useAndroidX=true

# Disable feature reports we don't need for a fixture build.
android.nonTransitiveRClass=true
android.nonFinalResIds=false

# Parallel + cache for slightly faster CI builds.
org.gradle.parallel=true
org.gradle.caching=true
